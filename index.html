<title>💕 Johnny & 太太的蜜月行程</title>
<style>

  :root {
    --rose: #e8a0b0;
    --deep-rose: #c0607a;
    --blush: #f9e8ed;
    --gold: #d4a853;
    --cream: #fdf6f0;
    --text: #4a3040;
    --shadow: rgba(192,96,122,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: linear-gradient(135deg, #fdf6f0 0%, #f9e8ed 50%, #fdf6f0 100%);
    min-height: 100vh;
    color: var(--text);
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #c0607a, #e8a0b0, #d4a853);
    padding: 40px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🌸 ✈️ 🗾 ✈️ 🌸';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    opacity: 0.6;
    letter-spacing: 10px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2em;
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    margin-top: 20px;
  }
  header p {
    color: rgba(255,255,255,0.9);
    font-size: 1em;
    margin-top: 8px;
    letter-spacing: 2px;
  }
  .heart-divider {
    font-size: 24px;
    margin: 10px 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }

  /* Main */
  main { max-width: 900px; margin: 0 auto; padding: 30px 15px 60px; }

  /* Summary Cards */
  .summary-bar {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .summary-card {
    flex: 1;
    min-width: 130px;
    background: white;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 4px 16px var(--shadow);
    border-top: 3px solid var(--rose);
  }
  .summary-card .icon { font-size: 28px; }
  .summary-card .label { font-size: 0.75em; color: #999; margin-top: 4px; }
  .summary-card .value { font-size: 1.1em; font-weight: 700; color: var(--deep-rose); }

  /* Day Cards */
  .day-card {
    background: white;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 6px 24px var(--shadow);
    overflow: hidden;
    transition: transform 0.2s;
  }
  .day-card:hover { transform: translateY(-2px); }

  .day-header {
    background: linear-gradient(90deg, var(--deep-rose), var(--rose));
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .day-header .date-info { display: flex; align-items: center; gap: 12px; }
  .day-number {
    background: rgba(255,255,255,0.25);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.1em;
  }
  .day-title { color: white; }
  .day-title .date { font-family: 'Playfair Display', serif; font-size: 1.1em; }
  .day-title .location { font-size: 0.8em; opacity: 0.9; }
  .day-toggle { color: white; font-size: 1.2em; transition: transform 0.3s; }
  .day-card.collapsed .day-toggle { transform: rotate(-90deg); }

  .day-body { padding: 20px; }
  .day-card.collapsed .day-body { display: none; }

  /* Activity Items */
  .activity {
    background: var(--blush);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    position: relative;
    border-left: 4px solid var(--rose);
  }
  .activity-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .activity-content { flex: 1; }
  .activity-title { font-weight: 700; font-size: 1em; color: var(--deep-rose); }
  .activity-desc { font-size: 0.85em; color: #777; margin-top: 4px; }
  .activity-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75em;
    font-weight: 700;
    text-decoration: none;
    transition: opacity 0.2s;
    cursor: pointer;

  .activity-actions { display: flex; gap: 6px; }
  .btn-icon {

    border: none;
    cursor: pointer;
    font-size: 1em;
    padding: 4px;
    border-radius: 6px;

  .hotel-tag {
    display: inline-block;
    background: linear-gradient(90deg, var(--gold), #e8c97a);
    color: white;
    font-size: 0.75em;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }

  /* Add Activity Form */
  .add-activity-btn {
    width: 100%;
    padding: 10px;
    background: var(--blush);
    border: 2px dashed var(--rose);
    border-radius: 12px;
    color: var(--deep-rose);
    font-size: 0.9em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .add-activity-btn:hover { background: var(--rose); color: white; border-style: solid; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;

  .modal {

    border-radius: 20px;
    padding: 30px;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

  .modal h3 {
    font-family: 'Playfair Display', serif;
    color: var(--deep-rose);

  .form-group label { display: block; font-size: 0.85em; font-weight: 700; color: var(--text); margin-bottom: 4px; }

    border-radius: 10px;
    font-size: 0.9em;
    font-family: 'Lato', sans-serif;
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--rose);
  }
  .links-builder { }
  .link-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .link-row select { width: 120px; flex-shrink: 0; }
  .link-row input { flex: 1; }
  .link-row .btn-icon { flex-shrink: 0; }
  .btn-add-link {
    background: none;
    border: 2px dashed var(--rose);
    color: var(--deep-rose);

    border-radius: 8px;

    font-size: 0.8em;
    font-weight: 700;
    margin-top: 4px;

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary {
    flex: 1;
    padding: 12px;
    background: linear-gradient(90deg, var(--deep-rose), var(--rose));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: 700;
    cursor: pointer;

  .btn-secondary {
    flex: 1;
    padding: 12px;
    background: #f0f0f0;
    color: #666;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: 700;
    cursor: pointer;
  }

    padding: 16px;
    background: white;
    border: 2px dashed var(--rose);
    border-radius: 20px;
    color: var(--deep-rose);

    font-weight: 700;

// State
let editingDayId = null;
let editingActId = null;
let deleteCallback = null;

function save() {
  localStorage.setItem('honeymoon_itinerary', JSON.stringify(data));
}

function load() {
  const saved = localStorage.getItem('honeymoon_itinerary');
  if (saved) data = JSON.parse(saved);
}

function uid() {
  return 'd' + Date.now() + Math.random().toString(36).substr(2,5);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const w = WEEKDAYS[d.getDay()];
  return `${m}/${day}（${w}）`;
}

function getLinkClass(type) {
  const map = { gmap: 'link-gmap', tabelog: 'link-tabelog', web: 'link-web', custom: 'link-custom' };
  return map[type] || 'link-custom';
}

function getLinkIcon(type) {
  const map = { gmap: '📍', tabelog: '🍽️', web: '🔗', custom: '🔗' };
  return map[type] || '🔗';
}

function render() {
  // Summary
  const totalDays = data.days.length;
  const totalActs = data.days.reduce((s, d) => s + d.activities.length, 0);
  const hotels = data.days.filter(d => d.activities.some(a => a.hotel)).length;
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card"><div class="icon">🗓️</div><div class="value">${totalDays}</div><div class="label">天</div></div>
    <div class="summary-card"><div class="icon">📍</div><div class="value">${totalActs}</div><div class="label">個行程</div></div>
    <div class="summary-card"><div class="icon">🏨</div><div class="value">${hotels}</div><div class="label">晚住宿</div></div>
    <div class="summary-card"><div class="icon">💕</div><div class="value">2</div><div class="label">人同行</div></div>
  `;

  // Itinerary
  const container = document.getElementById('itinerary');
  container.innerHTML = data.days.map((day, di) => `
    <div class="day-card" id="day-${day.id}">
      <div class="day-header" onclick="toggleDay('${day.id}')">
        <div class="date-info">
          <div class="day-number">${di + 1}</div>
          <div class="day-title">
            <div class="date">${formatDate(day.date)}</div>
            <div class="location">${day.location}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn-icon" onclick="event.stopPropagation();confirmDeleteDay('${day.id}')" title="刪除此日" style="color:rgba(255,255,255,0.8);font-size:1em">🗑️</button>
          <div class="day-toggle">▾</div>
        </div>
      </div>
      <div class="day-body">
        ${day.activities.map(act => `
          <div class="activity" id="act-${act.id}">
            <div class="activity-header">
              <div class="activity-content">
                <div class="activity-title">${act.title}</div>
                ${act.desc ? `<div class="activity-desc">${act.desc}</div>` : ''}
                ${act.links && act.links.length ? `
                  <div class="activity-links">
                    ${act.links.map(l => `
                      <a class="link-btn ${getLinkClass(l.type)}" href="${l.url}" target="_blank">${getLinkIcon(l.type)} ${l.label}</a>
                    `).join('')}
                  </div>
                ` : ''}
              </div>
              <div class="activity-actions">
                <button class="btn-icon" onclick="openEditActivity('${day.id}','${act.id}')" title="編輯">✏️</button>
                <button class="btn-icon" onclick="confirmDeleteActivity('${day.id}','${act.id}')" title="刪除">🗑️</button>
              </div>
            </div>
          </div>
        `).join('')}
        ${(function(){
          var hotelTag = '';
          for (var i = day.activities.length - 1; i >= 0; i--) {
            if (day.activities[i].hotel) { hotelTag = day.activities[i].hotel; break; }
          }
          return hotelTag ? '<div class="day-hotel-section"><div class="day-hotel-label">🏨 今晚住宿</div>' + hotelCard(hotelTag) + '</div>' : '';
        })()}
        <button class="add-activity-btn" onclick="openAddActivity('${day.id}')">＋ 新增行程項目</button>
      </div>
    </div>
  `).join('');
}

function toggleDay(dayId) {
  const el = document.getElementById('day-' + dayId);
  el.classList.toggle('collapsed');
}

// Activity Modal
function openAddActivity(dayId) {
  editingDayId = dayId;
  editingActId = null;
  document.getElementById('modalTitle').textContent = '新增行程項目';
  document.getElementById('actTitle').value = '';
  document.getElementById('actDesc').value = '';
  document.getElementById('actHotel').value = '';
  document.getElementById('linksBuilder').innerHTML = '';
  openModal('activityModal');
}

function openEditActivity(dayId, actId) {
  editingDayId = dayId;
  editingActId = actId;
  const day = data.days.find(d => d.id === dayId);
  const act = day.activities.find(a => a.id === actId);
  document.getElementById('modalTitle').textContent = '編輯行程項目';
  document.getElementById('actTitle').value = act.title;
  document.getElementById('actDesc').value = act.desc || '';
  document.getElementById('actHotel').value = act.hotel || '';
  document.getElementById('linksBuilder').innerHTML = '';
  (act.links || []).forEach(l => addLinkRow(l.type, l.label, l.url));
  openModal('activityModal');
}

function addLinkRow(type='gmap', label='', url='') {
  const div = document.createElement('div');
  div.className = 'link-row';
  div.innerHTML = `
    <select onchange="this.nextElementSibling.placeholder=getLinkPlaceholder(this.value)">
      <option value="gmap" ${type==='gmap'?'selected':''}>📍 地圖</option>
      <option value="tabelog" ${type==='tabelog'?'selected':''}>🍽️ Tabelog</option>
      <option value="web" ${type==='web'?'selected':''}>🔗 網站</option>
      <option value="custom" ${type==='custom'?'selected':''}>✏️ 自訂</option>
    </select>
    <input type="text" placeholder="連結標題" value="${label}" style="max-width:120px">
    <input type="text" placeholder="https://..." value="${url}" style="flex:2">
    <button class="btn-icon" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('linksBuilder').appendChild(div);
}

function getLinkPlaceholder(type) {
  return { gmap:'Google Maps URL', tabelog:'Tabelog URL', web:'網站 URL', custom:'URL' }[type] || 'URL';
}

function saveActivity() {
  const title = document.getElementById('actTitle').value.trim();
  if (!title) { alert('請輸入活動名稱'); return; }
  const desc = document.getElementById('actDesc').value.trim();
  const hotel = document.getElementById('actHotel').value.trim();
  const linkRows = document.getElementById('linksBuilder').querySelectorAll('.link-row');
  const links = [];
  linkRows.forEach(row => {
    const type = row.querySelector('select').value;
    const inputs = row.querySelectorAll('input');
    const label = inputs[0].value.trim();
    const url = inputs[1].value.trim();
    if (url) links.push({ type, label: label || url, url });
  });

  const day = data.days.find(d => d.id === editingDayId);
  if (editingActId) {
    const act = day.activities.find(a => a.id === editingActId);
    act.title = title; act.desc = desc; act.hotel = hotel; act.links = links;
  } else {
    day.activities.push({ id: uid(), title, desc, hotel, links });
  }
  save(); render(); closeModal('activityModal');
}

// Day Modal
function openAddDayModal() {
  document.getElementById('newDayDate').value = '';
  document.getElementById('newDayLocation').value = '';
  openModal('addDayModal');
}

function saveNewDay() {
  const date = document.getElementById('newDayDate').value;
  const location = document.getElementById('newDayLocation').value.trim();
  if (!date || !location) { alert('請填寫日期和地點'); return; }
  data.days.push({ id: uid(), date, location, activities: [] });
  data.days.sort((a, b) => a.date.localeCompare(b.date));
  save(); render(); closeModal('addDayModal');
}

// Delete
function confirmDeleteDay(dayId) {
  const day = data.days.find(d => d.id === dayId);
  document.getElementById('confirmMsg').textContent = `確定要刪除「${formatDate(day.date)} ${day.location}」整日行程？`;
  deleteCallback = () => { data.days = data.days.filter(d => d.id !== dayId); save(); render(); };
  openModal('confirmModal');
}

function confirmDeleteActivity(dayId, actId) {
  const day = data.days.find(d => d.id === dayId);
  const act = day.activities.find(a => a.id === actId);
  document.getElementById('confirmMsg').textContent = `確定要刪除「${act.title}」？`;
  deleteCallback = () => { day.activities = day.activities.filter(a => a.id !== actId); save(); render(); };
  openModal('confirmModal');
}

function confirmDeleteAction() {
  if (deleteCallback) deleteCallback();
  deleteCallback = null;
  closeModal('confirmModal');
}

function copyText(btn, text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ Copied!'; btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  }
}

function hotelCard(hotelTag) {

  s += '</div>';
  return s;
}

    var h = HOTELS[k];
    return h.name + ' TEL:' + h.phone + ' CI:' + h.checkin;
  }).join('\n');
  return '你係蜜月旅行助手，用廣東話回答。行程：\n' + lines + '\n\n酒店：\n' + hotels;
}

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatWindow').classList.toggle('open', chatOpen);
  if (chatOpen) document.getElementById('chatInput').focus();
}

function askSuggestion(btn) {
  document.getElementById('chatInput').value = btn.textContent;
  document.getElementById('chatSuggestions').style.display = 'none';
  sendChat();
}

function appendBubble(role, text, typing) {
  var msgs = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'chat-bubble ' + role + (typing ? ' typing' : '');
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function sendChat() {
  var input = document.getElementById('chatInput');
  var btn = document.getElementById('chatSend');
  var text = input.value.trim();
  if (!text) return;
  var key = getAzureKey();
  if (!key) return;
  input.value = ''; input.style.height = 'auto'; btn.disabled = true;
  appendBubble('user', text, false);
  chatHistory.push({ role: 'user', content: text });
  var tb = appendBubble('ai', '…', true);
  var msgs = [{ role: 'system', content: buildSystemPrompt() }].concat(chatHistory.slice(-8));
  fetch(AZURE_EP, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'api-key': key },
    body: JSON.stringify({ messages: msgs, max_tokens: 400, temperature: 0.7 })
  }).then(function(r){ return r.json(); }).then(function(j){
    var reply = j.choices[0].message.content;
    tb.textContent = reply; tb.classList.remove('typing');
    chatHistory.push({ role: 'assistant', content: reply });
  }).catch(function(){
    tb.textContent = '唔好意思，出咗問題 😅 請再試。'; tb.classList.remove('typing');
    chatHistory.pop();
  }).finally(function(){ btn.disabled = false; document.getElementById('chatInput').focus(); });
}

// Init
load();
render();
</script>

<button class="chat-fab" onclick="toggleChat()" title="問旅行助手">💬</button>
<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div><div class="title">✨ 蜜月旅行助手</div><div class="subtitle">Ask me about your trip!</div></div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-bubble ai">你好！我係你哋嘅蜜月旅行助手 💕 有咩問題都可以問我！</div>
  </div>
  <div class="chat-suggestions" id="chatSuggestions">
    <button class="chat-suggest-btn" onclick="askSuggestion(this)">第幾天去富士山？</button>
    <button class="chat-suggest-btn" onclick="askSuggestion(this)">酒店幾點check-in？</button>
    <button class="chat-suggest-btn" onclick="askSuggestion(this)">箱根溫泉電話？</button>
    <button class="chat-suggest-btn" onclick="askSuggestion(this)">迪士尼係邊天？</button>
  </div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chatInput" placeholder="問問行程嘅嘢…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">➤</button>
  </div>
</div>

</body>
</html>
